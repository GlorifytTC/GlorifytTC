<!-- nav.html -->
<nav class="navbar">
    <a href="index.html" class="logo">
        <div class="logo-icon">G</div>
        <div class="logo-text">GlorifyTC</div>
    </a>
    <div class="nav-links">
        <a href="index.html" id="nav-home">Home</a>
        <a href="services.html" id="nav-services">Services</a>
        <a href="about.html" id="nav-about">About</a>
        <a href="team.html" id="nav-team">Team</a>
        <a href="blog.html" id="nav-blog">Blog</a>
        <a href="contact.html" id="nav-contact">Contact</a>
    </div>
    <a href="contact.html" class="cta-button">Get Started</a>
</nav>

<script>
// Auto-highlight current page in navigation
document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop().toLowerCase() || 'index.html';
    const navLinks = document.querySelectorAll('.nav-links a');
    
    navLinks.forEach(link => {
        const linkHref = link.getAttribute('href').toLowerCase();
        if (linkHref === currentPage || 
            (currentPage === '' && linkHref === 'index.html') ||
            (currentPage === '/' && linkHref === 'index.html')) {
            link.classList.add('active');
        }
    });
});
</script>
